<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <title>box modal</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aqua;
        }
        .box1{
            color: red;
            padding: 10px;
            margin: 25px;
            border: 2px solid red;
            height: 200;
            box-sizing: border-box;
        }
        .box2{
            color: yellow;
            padding: 10px;
            margin: 25px;
            border: 2px solid black;
            height: 200;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box box1">box modal</div>
    <div class="box box2">another box modal</div>

</body>
</html>
